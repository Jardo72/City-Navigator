name: Docker Images

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]
    paths:
      - 'application/master-data-service/**'
      - 'application/query-service/**'
      - '.github/workflows/docker-images.yml'
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: master-data-service
            context: application/master-data-service
            image: jardo72/city-navigator-master-data-service
          - service: query-service
            context: application/query-service
            image: jardo72/city-navigator-query-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Resolve image reference for Trivy
        id: trivy-ref
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "ref=${{ steps.build.outputs.imageid }}" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "$GITHUB_SHA" | cut -c1-7)
            echo "ref=${{ matrix.image }}:sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@0.29.0
        with:
          image-ref: ${{ steps.trivy-ref.outputs.ref }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
