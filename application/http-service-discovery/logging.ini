[loggers]
keys=root

[handlers]
keys=console

[formatters]
keys=default

[logger_root]
level=DEBUG
handlers=console

[formatter_default]
format=[%(asctime)s.%(msecs)03d] %(levelname)s [%(thread)d] - %(message)s

[handler_logfile]
class=handlers.RotatingFileHandler
# level=DEBUG
args=('http-discovery-svc.log', 'a')
formatter=default

[handler_console]
class=StreamHandler
level=DEBUG
formatter=default
