worker_processes  1;

events {
    worker_connections  1024;
}


http {
    sendfile                on;
    keepalive_timeout       65;
	client_max_body_size    50M;
	proxy_request_buffering off;

    server {
        listen       80;
        server_name  localhost;

        location ~ /city-navigator/api/master-data(.*) {
            proxy_pass         https://master-data-service$1$is_args$args;
            proxy_redirect     off;
            proxy_cache        off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }

        location ~ /city-navigator/api/query(.*) {
            proxy_pass         https://query-service$1$is_args$args;
            proxy_redirect     off;
            proxy_cache        off;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Host $server_name;
        }
    }
}
