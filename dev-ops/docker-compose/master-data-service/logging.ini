[loggers]
keys=root

[handlers]
keys=console,logfile

[formatters]
keys=default,json

[logger_root]
level=INFO
handlers=console,logfile

[formatter_default]
format=[%(asctime)s.%(msecs)03d] %(levelname)s [%(thread)d] - %(message)s

[formatter_json]
class=foundation.json_formatter.JsonFormatter

[handler_console]
class=StreamHandler
level=INFO
formatter=default

[handler_logfile]
class=handlers.RotatingFileHandler
level=INFO
formatter=json
args=('/app-logs/master-data-service.log', 'a', 10485760, 5, 'utf-8')
