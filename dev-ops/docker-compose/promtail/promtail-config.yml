server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: city-navigator
    static_configs:
      - targets:
          - localhost
        labels:
          job: city-navigator
          __path__: /app-logs/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            message: message
      - labels:
          level:
          logger:
