services:
  redis-pubsub:
    image: redis:6.2.11-alpine
    expose:
      - 6379
    networks:
      - service-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  master-data-service:
    image: jardo72/city-navigator-master-data-service:latest
    depends_on:
      - redis-pubsub
    environment:
      - API_DOC_ENABLED=yes
      - ROOT_PATH=/city-navigator/api/master-data
      - ACCESS_LOG=/access-logs/master-data-service-access.log
      - DATABASE_URL=sqlite:////db/sqlite.db
      - REDIS_HOST=redis-pubsub
      - REDIS_PORT=6379
    expose:
      - 8000
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./data
        target: /db
        read_only: false
      - type: bind
        source: ./access-logs
        target: /access-logs
        read_only: false
    deploy:
      resources:
        reservations:
          cpus: '0.25'
          memory: 250M
        limits:
          cpus: '0.5'
          memory: 750M
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 10s

  query-service:
    image: jardo72/city-navigator-query-service:latest
    depends_on:
      - redis-pubsub
      - master-data-service
    expose:
      - 8000
    environment:
      - API_DOC_ENABLED=yes
      - ROOT_PATH=/city-navigator/api/query
      - ACCESS_LOG=/access-logs/query-service-access.log
      - MASTER_DATA_SERVICE_BASE_URL=http://master-data-service:8000
      - REDIS_HOST=redis-pubsub
      - REDIS_PORT=6379
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./access-logs
        target: /access-logs
        read_only: false
    deploy:
      resources:
        reservations:
          cpus: '1.5'
          memory: 1G
        limits:
          cpus: '3.5'
          memory: 3G
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 10s

  nginx-http-router:
    image: nginx:1.23.3-alpine
    depends_on:
      - master-data-service
      - query-service
    expose:
      - 80
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./nginx
        target: /etc/nginx
        read_only: true
    ports:
      - 80:80
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  prometheus-server:
    image: prom/prometheus
    depends_on:
      - master-data-server
      - query-service
    networks:
      - service-network
      - monitoring-network
    volumes:
      - type: bind
        source: ./prometheus
        target: /etc/prometheus/
        read_only: true
    ports:
      - 9090:9090
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus-server
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaSecret#37
    networks:
      - monitoring-network
    volumes:
      - type: bind
        source: ./grafana
        target: /etc/grafana/provisioning/datasources
        read_only: true
    ports:
      - 3000:3000

networks:
  service-network:
    driver: bridge
  monitoring-network:
    driver: bridge
