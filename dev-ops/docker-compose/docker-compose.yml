services:
  postgres-db:
    image: jardo72/city-navigator-postgres:latest
    environment:
      - POSTGRES_USER=city_navigator
      - POSTGRES_PASSWORD=city_navigator
      - POSTGRES_DB=city_navigator
    expose:
      - 5432
    networks:
      - service-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  redis-pubsub:
    image: redis:7-alpine
    expose:
      - 6379
    networks:
      - service-network
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  master-data-service:
    image: jardo72/city-navigator-master-data-service:latest
    depends_on:
      - redis-pubsub
      - postgres-db
      - prometheus-http-discovery
    environment:
      # if API doc is enabled, metrics scraping does not work
      - API_DOC_ENABLED=no
      - ROOT_PATH=/city-navigator/api/master-data
      - ACCESS_LOG=/access-logs/master-data-service-access.log
      - DATABASE_URL=postgresql://city_navigator:city_navigator@postgres-db:5432/city_navigator
      - REDIS_HOST=redis-pubsub
      - REDIS_PORT=6379
      - PROMETHEUS_DISCOVERY_BASE_URL=http://prometheus-http-discovery:8000
    expose:
      - 8000
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./access-logs
        target: /access-logs
        read_only: false
    deploy:
      resources:
        reservations:
          cpus: '0.25'
          memory: 250M
        limits:
          cpus: '0.5'
          memory: 750M
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 10s

  query-service:
    image: jardo72/city-navigator-query-service:latest
    depends_on:
      - redis-pubsub
      - master-data-service
      - prometheus-http-discovery
    environment:
      # if API doc is enabled, metrics scraping does not work
      - API_DOC_ENABLED=no
      - ROOT_PATH=/city-navigator/api/query
      - ACCESS_LOG=/access-logs/query-service-access.log
      - MASTER_DATA_SERVICE_BASE_URL=http://master-data-service:8000
      - REDIS_HOST=redis-pubsub
      - REDIS_PORT=6379
      - PROMETHEUS_DISCOVERY_BASE_URL=http://prometheus-http-discovery:8000
    expose:
      - 8000
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./access-logs
        target: /access-logs
        read_only: false
    deploy:
      # replicated deployment with 2+ replicas does not seem to provide any performance improvements
      # mode: replicated
      # replicas: 2
      resources:
        reservations:
          cpus: '1.5'
          memory: 1G
        limits:
          cpus: '3.5'
          memory: 3G
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 10s

  nginx-http-router:
    image: nginx:1.27-alpine
    depends_on:
      - master-data-service
      - query-service
    expose:
      - 80
    networks:
      - service-network
    volumes:
      - type: bind
        source: ./nginx
        target: /etc/nginx
        read_only: true
    ports:
      - 80:80
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  prometheus-server:
    image: prom/prometheus
    depends_on:
      - master-data-service
      - query-service
    networks:
      - service-network
      - monitoring-network
    volumes:
      - type: bind
        source: ./prometheus
        target: /etc/prometheus/
        read_only: true
    ports:
      - 9090:9090
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  prometheus-http-discovery:
    image: jardo72/city-navigator-http-service-discovery:latest
    environment:
      - ACCESS_LOG=/access-logs/http-service-discovery-access.log
    expose:
      - 8000
    networks:
      - service-network
      - monitoring-network
    volumes:
      - type: bind
        source: ./access-logs
        target: /access-logs
        read_only: false
    ports:
      - 9099:8000
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
        delay: 5s

  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus-server
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=GrafanaSecret#37
    networks:
      - monitoring-network
    volumes:
      - type: bind
        source: ./grafana/datasources
        target: /etc/grafana/provisioning/datasources
        read_only: true
      - type: bind
        source: ./grafana/dashboards
        target: /etc/grafana/provisioning/dashboards
        read_only: true
    ports:
      - 3000:3000

networks:
  service-network:
    driver: bridge
  monitoring-network:
    driver: bridge
