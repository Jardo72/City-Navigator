apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-data-sources
  namespace: city-navigator
  labels:
    application: city-navigator
    component: grafana
    environment: sandbox
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
    - name: Prometheus
      type: prometheus
      url: http://prometheus-server-service.city-navigator:9090
      isDefault: true
      access: proxy
      editable: true

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
  namespace: city-navigator
  labels:
    application: city-navigator
    component: grafana
    environment: sandbox
spec:
  replicas: 1
  template:
    metadata:
      name: grafana
      labels:
        application: city-navigator
        component: grafana
        environment: sandbox
    spec:
      containers:
        - name: grafana
          image: grafana/grafana
          imagePullPolicy: Always
          volumeMounts:
            - name: grafana-data-sources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: GrafanaSecret#37
      volumes:
        - name: grafana-data-sources
          configMap:
            name: grafana-data-sources
  selector:
    matchLabels:
      application: city-navigator
      component: grafana
      environment: sandbox
  strategy:
    type: RollingUpdate

---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: city-navigator
  labels:
    application: city-navigator
    component: grafana
    environment: sandbox
spec:
  type: ClusterIP
  selector:
    application: city-navigator
    component: grafana
    environment: sandbox
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
