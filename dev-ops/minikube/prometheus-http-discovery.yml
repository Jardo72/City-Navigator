apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-http-discovery-deployment
  namespace: city-navigator
  labels:
    application: city-navigator
    component: prometheus-http-discovery
    environment: sandbox
spec:
  replicas: 1
  template:
    metadata:
      name: prometheus-http-discovery
      labels:
        application: city-navigator
        component: prometheus-http-discovery
        environment: sandbox
    spec:
      containers:
        - name: prometheus-http-discovery
          image: jardo72/city-navigator-http-service-discovery:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
  selector:
    matchLabels:
      application: city-navigator
      component: prometheus-http-discovery
      environment: sandbox
  strategy:
    type: RollingUpdate

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-http-discovery-service
  namespace: city-navigator
  labels:
    application: city-navigator
    component: prometheus-http-discovery
    environment: sandbox
spec:
  type: ClusterIP
  selector:
    application: city-navigator
    component: prometheus-http-discovery
    environment: sandbox
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
