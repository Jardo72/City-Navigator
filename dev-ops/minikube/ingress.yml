# see https://kubernetes.io/docs/tasks/access-application-cluster/ingress-minikube/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: query-svc-ingress
  namespace: city-navigator
  labels:
    application: city-navigator
    component: query-service
    environment: sandbox
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
    - host: city-navigator
      http:
        paths:
          - path: /api/query
            pathType: Prefix
            backend:
              service:
                name: query-svc-service
                port:
                  number: 8000
          - path: /api/master-data
            pathType: Prefix
            backend:
              service:
                name: master-data-svc-service
                port:
                  number: 8000
