# ConfigMaps that provision dashboards into Rancher's built-in Grafana.
# The label "grafana_dashboard: '1'" causes the Grafana sidecar to pick them up automatically.
# These must be deployed to the cattle-dashboards namespace — the Grafana sidecar in Rancher
# Monitoring watches that namespace, not cattle-monitoring-system.
#
# Note: the dashboard JSON embeds a Prometheus datasource UID ("prometheus").
# If the UID does not match the datasource registered in Rancher's Grafana, open each
# dashboard after deployment, re-select the Prometheus datasource, and save.

apiVersion: v1
