apiVersion: batch/v1
kind: Job
metadata:
  name: data-importer
  namespace: city-navigator
  labels:
    application: city-navigator
    component: data-importer
    environment: sandbox
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        application: city-navigator
        component: data-importer
        environment: sandbox
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: jardo72/city-navigator-postgres:latest
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - until pg_isready -h postgres-service.city-navigator -p 5432; do echo "Waiting for PostgreSQL..."; sleep 2; done
      containers:
        - name: data-importer
          image: jardo72/city-navigator-data-importer:latest
          imagePullPolicy: Always
          args:
            - city-plan.json
            - postgresql+psycopg2://jardo:heslo@postgres-service.city-navigator:5432/city-navigator
