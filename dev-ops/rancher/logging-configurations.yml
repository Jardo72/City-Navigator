apiVersion: v1
kind: ConfigMap
metadata:
  name: master-data-svc-logging-config
  namespace: city-navigator
  labels:
    application: city-navigator
    component: master-data-service
    environment: sandbox
data:
  logging.yaml: |
    version: 1
    disable_existing_loggers: false

    formatters:
      default:
        format: "[%(asctime)s.%(msecs)03d] %(levelname)s [%(thread)d] - %(message)s"

    handlers:
      console:
        class: logging.StreamHandler
        level: INFO
        formatter: default
        stream: ext://sys.stdout

    root:
      level: INFO
      handlers: [console]

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: query-svc-logging-config
  namespace: city-navigator
  labels:
    application: city-navigator
    component: query-service
    environment: sandbox
data:
  logging.yaml: |
    version: 1
    disable_existing_loggers: false

    formatters:
      default:
        format: "[%(asctime)s.%(msecs)03d] %(levelname)s [%(thread)d] - %(message)s"

    handlers:
      console:
        class: logging.StreamHandler
        level: INFO
        formatter: default
        stream: ext://sys.stdout

    root:
      level: INFO
