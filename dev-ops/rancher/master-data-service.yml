apiVersion: apps/v1
kind: Deployment
metadata:
  name: master-data-svc-deployment
  namespace: city-navigator
  labels:
    application: city-navigator
    component: master-data-service
    environment: sandbox
spec:
  replicas: 1
  template:
    metadata:
      name: master-data-svc
      labels:
        application: city-navigator
        component: master-data-service
        environment: sandbox
    spec:
      containers:
        - name: master-data-service
          image: jardo72/city-navigator-master-data-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: API_DOC_ENABLED
              value: "no"
            - name: ROOT_PATH
              value: /city-navigator/api/master-data
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
            - name: DATABASE_URL
              value: postgresql+psycopg2://$(DB_USERNAME):$(DB_PASSWORD)@postgres-service.city-navigator:5432/city-navigator
            - name: REDIS_HOST
              value: redis-service.city-navigator
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              cpu: "500m"
              memory: "750M"
            limits:
              cpu: "1000m"
              memory: "1.5G"
          volumeMounts:
            - name: logging-config
              mountPath: /usr/src/app/logging.yaml
              subPath: logging.yaml
      volumes:
        - name: logging-config
          configMap:
            name: master-data-svc-logging-config
  selector:
    matchLabels:
      application: city-navigator
      component: master-data-service
      environment: sandbox
  strategy:
    type: RollingUpdate

---
apiVersion: v1
kind: Service
metadata:
  name: master-data-svc-service
  namespace: city-navigator
  labels:
    application: city-navigator
    component: master-data-service
    environment: sandbox
spec:
  type: ClusterIP
  selector:
    application: city-navigator
    component: master-data-service
    environment: sandbox
  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000
