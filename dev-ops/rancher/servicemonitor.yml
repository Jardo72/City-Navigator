# ServiceMonitor resources for Prometheus Operator (Rancher Monitoring / kube-prometheus-stack).
# Prometheus discovers the city-navigator services via these CRDs instead of the custom
# HTTP service discovery used in the minikube deployment.
#
# The label "release: rancher-monitoring" must match the serviceMonitorSelector configured
# in the Prometheus Operator. Verify with:
#   kubectl get prometheus -n cattle-monitoring-system -o jsonpath='{.items[0].spec.serviceMonitorSelector}'

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: master-data-service-monitor
  namespace: city-navigator
  labels:
    application: city-navigator
    component: master-data-service
    environment: sandbox
    release: rancher-monitoring
spec:
  selector:
    matchLabels:
      application: city-navigator
      component: master-data-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - city-navigator

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: query-service-monitor
  namespace: city-navigator
  labels:
    application: city-navigator
    component: query-service
    environment: sandbox
    release: rancher-monitoring
spec:
  selector:
    matchLabels:
      application: city-navigator
      component: query-service
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
  namespaceSelector:
    matchNames:
      - city-navigator
